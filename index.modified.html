            body, html { background-color: white !important; margin: 0; padding: 0; overflow: visible; }

            #printOverlay { display: block !important; }

    <script>
        // Constantes de Formatos
        const PAPER_SIZES = {
            A4: { name: 'A4', w: 210, h: 297 },
            Letter: { name: 'Carta', w: 215.9, h: 279.4 },
            Oficio: { name: 'Oficio (Mx)', w: 215.9, h: 340 },
            A3: { name: 'A3', w: 297, h: 420 },
            Tabloid: { name: 'Doble Carta', w: 279.4, h: 431.8 }
        };
        const SAFE_MARGIN_MM = 5;
        const DPI_DISPLAY = 96;
        const DPI_EXPORT = 300;
        const MM_TO_INCH = 25.4;
        const mmToPx = (mm, dpi) => (mm / MM_TO_INCH) * dpi;

        // Estado Global
        let state = {
            images: [],
            paperId: 'p1',
            isPortrait: true,
            gridMode: 'preset',
            gridPreset: 4,
            gridCm: 5,
            idOrientation: 'horiz', 
            isDarkMode: false,
            showCropMarks: true,
            isStickerMode: false,
            isMonochrome: false,
            imageFit: 'cover',
            imageZoom: 100,
            workspaceZoom: 100,
            density: 0,
            pageDensities: [], // Densidades por cada lienzo
            customSuggestedPrice: null, // Sobrescribir precio sugerido
            costs: { printerPrice: 4500, printerLife: 20000, inkPrice: 850, inkYield: 6500, suggestedRounding: 'half' },
            papers: [
                { id: 'p1', name: 'Carta Bond', size: 'Letter', price: 650, count: 5000, maxSalePrice: 8 },
                { id: 'p2', name: 'Oficio Bond', size: 'Oficio', price: 800, count: 5000, maxSalePrice: 10 },
                { id: 'p3', name: 'Opalina 120g', size: 'Letter', price: 150, count: 100, maxSalePrice: 11 },
                { id: 'p4', name: 'Opalina 220g', size: 'Letter', price: 180, count: 100, maxSalePrice: 12 },
                { id: 'p5', name: 'Doblecarta', size: 'Tabloid', price: 300, count: 500, maxSalePrice: 16 },
                { id: 'p6', name: 'Couche', size: 'Letter', price: 200, count: 100, maxSalePrice: 18 },
                { id: 'p7', name: 'Fotográfico', size: 'Letter', price: 240, count: 100, maxSalePrice: 25 }
            ],
            salesLog: []
        };

        let derived = { currentPaper: null, physicalSize: null, gridInfo: null, pages: [] };

        // (Se omiten funciones no alteradas para brevedad en esta copia)

        function updateFinancials() {
            if(state.images.length === 0) {
                document.getElementById('fin-costSheet').innerText = '$0.00';
                document.getElementById('fin-inkCost').innerText = '$0.00';
                document.getElementById('fin-equipCost').innerText = '$0.00';
                document.getElementById('fin-totalOp').innerText = '$0.00';
                document.getElementById('fin-suggested').value = '0.00';
                document.getElementById('fin-profit').innerText = '$0.00';
                document.getElementById('fin-hojas').innerText = 'x0 Hoja(s)';
                document.getElementById('fin-density').innerText = '(0% cov)';
                return;
            }

            const c = state.costs;
            const p = derived.currentPaper;
            const costPerSheet = p.price / p.count;
            const eq = c.printerPrice / (c.printerLife * 2);

            let totSugOriginal = 0; // Sugerido original antes de descuentos y límites
            let totOp = 0;
            const totCells = derived.gridInfo.cells.length;

            // Calcular valores por página (costo operativo por página y sugerido por página)
            derived.pages.forEach((pg, idx) => {
                const density = state.pageDensities[idx] || 0;
                const ink = (density/100) * (c.inkPrice/c.inkYield) * 1.1;
                const opUnit = costPerSheet + ink + eq; // costo operativo unitario de esta página
                totOp += opUnit;

                let pageSug = 0;
                if (totCells === 1) {
                    // LOGICA ORIGINAL DE PRECIO SUGERIDO (modificada):
                    // Antes: pageSug = opUnit + (p.maxSalePrice * (density / 100));
                    // Para preservar intención original, mantenemos el cálculo base pero lo acumulamos en totSugOriginal
                    pageSug = opUnit + (p.maxSalePrice * (density / 100));
                } else {
                    const base = (p.maxSalePrice / totCells) * pg.length;
                    pageSug = Math.max(base, opUnit * 2);
                }

                totSugOriginal += pageSug;
            });

            // Aplicar descuento por monocromo SOLO sobre la parte NO operativa del sugerido
            // (según requerimiento: descuento aplica al "precio sugerido sin contar el costo operativo")
            let totSugAdjusted = totSugOriginal;
            if (state.isMonochrome) {
                // Factor de monocromo: conservar el costo operativo y reducir la parte restante.
                // Se interpreta que la configuración previa de *multiplicar por 0.25* significaba dejar el 25% de la parte no-operativa.
                const nonOpPart = Math.max(0, totSugOriginal - totOp);
                const monoFactor = 0.25; // deja 25% de la parte no operativa
                const discountedNonOp = nonOpPart * monoFactor;
                totSugAdjusted = discountedNonOp + totOp;
            }

            // Limitar precio sugerido: nunca superar el máximo definido en la tabla (por hoja)
            // y nunca ser menor que 3 veces el costo operativo total.
            const maxTotalSale = derived.pages.length * (p.maxSalePrice || 0);
            const minTotalSale = 3 * totOp;

            // Aplicar límites
            if (totSugAdjusted > maxTotalSale) totSugAdjusted = maxTotalSale;
            if (totSugAdjusted < minTotalSale) totSugAdjusted = minTotalSale;

            // Aplicar redondeo según configuración
            let finalSug = totSugAdjusted;

            let rMode = c.suggestedRounding;
            if (rMode === true) rMode = 'half';
            if (rMode === false) rMode = 'none';
            if (!rMode) rMode = 'half';

            if (rMode === 'half') {
                finalSug = Math.round(finalSug * 2) / 2;
            } else if (rMode === 'whole') {
                finalSug = Math.round(finalSug);
            }

            // Actualización de Textos
            const firstDensity = state.pageDensities[0] || 0;
            const firstInk = (firstDensity/100) * (c.inkPrice/c.inkYield) * 1.1;
            document.getElementById('fin-costSheet').innerText = `$${costPerSheet.toFixed(2)}`;
            document.getElementById('fin-inkCost').innerText = `$${firstInk.toFixed(2)}`;
            document.getElementById('fin-equipCost').innerText = `$${eq.toFixed(2)}`;
            document.getElementById('fin-totalOp').innerText = `$${totOp.toFixed(2)}`;
            
            // Comprobación de Precio de Venta Sugerido Editable
            const sugInput = document.getElementById('fin-suggested');
            if (state.customSuggestedPrice === null || state.customSuggestedPrice === undefined) {
                sugInput.value = finalSug.toFixed(2);
            } else {
                // Si el usuario ha introducido un precio personalizado, aplicamos igualmente los límites (no debe saltárselos)
                let userVal = Number(state.customSuggestedPrice);
                if (isNaN(userVal)) userVal = finalSug;
                // Forzar a los límites
                if (userVal > maxTotalSale) userVal = maxTotalSale;
                if (userVal < minTotalSale) userVal = minTotalSale;
                // Aplicar redondeo
                if (rMode === 'half') userVal = Math.round(userVal * 2) / 2;
                else if (rMode === 'whole') userVal = Math.round(userVal);
                sugInput.value = userVal.toFixed(2);
                finalSug = userVal;
            }

            const profit = finalSug - totOp;
            const pEl = document.getElementById('fin-profit');
            pEl.innerText = `$${profit.toFixed(2)}`;
            pEl.className = `text-xl font-black font-mono ${profit > 0 ? 'text-emerald-500' : 'text-gray-400'}`;
            
            document.getElementById('fin-hojas').innerText = `x${derived.pages.length} Hoja(s)`;
            document.getElementById('fin-density').innerText = `(${firstDensity.toFixed(0)}% cov)`;
        }

        // (Resto del script sigue igual en la copia: funciones de render, eventos, etc.)

        // Inicialización
        function init() {
            // implementación original (omitted in this test copy)
        }

        // Exponer init para pruebas
        window._papePrinter_init = init;
    </script>
